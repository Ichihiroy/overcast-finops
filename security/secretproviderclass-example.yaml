# Reference rendering of the SecretProviderClass the backend chart deploys
# (deploy/backend/templates/secretproviderclass.yaml is the source of truth —
# this standalone copy shows the full Key Vault → CSI → K8s Secret wiring with
# placeholders, for review without rendering Helm).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: backend-kv
  namespace: app-production
spec:
  provider: azure
  parameters:
    # Workload identity: the backend ServiceAccount's federated user-assigned
    # identity (terraform output app_identity_client_id). No secrets involved.
    clientID: "<app_identity_client_id>"
    keyvaultName: "<key_vault_name>"
    tenantId: "<tenant_id>"
    objects: |
      array:
        - |
          objectName: sql-datasource-url
          objectType: secret
        - |
          objectName: sql-datasource-username
          objectType: secret
        - |
          objectName: sql-datasource-password
          objectType: secret
  # Sync into a K8s Secret so the Deployment can envFrom it with the exact
  # contract names the app expects.
  secretObjects:
    - secretName: backend-db
      type: Opaque
      data:
        - objectName: sql-datasource-url
          key: SPRING_DATASOURCE_URL
        - objectName: sql-datasource-username
          key: SPRING_DATASOURCE_USERNAME
        - objectName: sql-datasource-password
          key: SPRING_DATASOURCE_PASSWORD
# When the AI assistant is enabled (secretProviderClass.aiEnabled=true, set by
# Terraform iff the AZURE_OPENAI_API_KEY repo secret exists), four more
# objects join both lists above, synced under the same backend-db Secret:
#   azure-openai-endpoint    → AZURE_OPENAI_ENDPOINT
#   azure-openai-api-key     → AZURE_OPENAI_API_KEY
#   azure-openai-deployment  → AZURE_OPENAI_DEPLOYMENT
#   azure-openai-api-version → AZURE_OPENAI_API_VERSION
