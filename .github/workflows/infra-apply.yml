name: infra-apply

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
  # Morning kickstart (GUIDE.md): the training subscription is wiped nightly;
  # this button re-creates the entire platform from the last-applied state.
  # Still reviewer-gated — the job runs in the 'production' environment.
  workflow_dispatch:

# Never cancel a running apply (state corruption risk); queue instead.
concurrency:
  group: infra-apply
  cancel-in-progress: false

permissions: {}

env:
  TF_DIR: infra/terraform
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_PLATFORM_RW }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  # ingress hosts feed the Argo CD Application specs (gitops.tf)
  TF_VAR_frontend_host_staging: ${{ vars.FRONTEND_HOST_STAGING }}
  TF_VAR_frontend_host_production: ${{ vars.FRONTEND_HOST_PRODUCTION }}
  # Azure OpenAI (optional AI assistant): endpoint/deployment are identifiers
  # (repo variables); the key is a repo SECRET. Blank = AI wiring disabled.
  TF_VAR_azure_openai_endpoint: ${{ vars.AZURE_OPENAI_ENDPOINT }}
  TF_VAR_azure_openai_deployment: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
  TF_VAR_azure_openai_api_key: ${{ secrets.AZURE_OPENAI_API_KEY }}

jobs:
  apply:
    runs-on: ubuntu-latest
    # Human gate: 'production' has a required reviewer. The RW identity's
    # federated credential ONLY matches this environment, so the credentials
    # physically cannot be used from an unreviewed context.
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1.9"

      - name: Terraform init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init -input=false \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=infra.tfstate"

      - name: Terraform plan
        run: terraform -chdir=${{ env.TF_DIR }} plan -input=false -out=tfplan

      - name: Terraform apply (the reviewed plan file, nothing else)
        id: apply
        continue-on-error: true
        run: terraform -chdir=${{ env.TF_DIR }} apply -input=false tfplan

      # Nightly-wipe recovery (GUIDE.md "Morning kickstart"). The wiped Key
      # Vault is soft-deleted + purge-protected, so the apply above recovers
      # it — complete with yesterday's secrets, which the fresh state doesn't
      # know about ("already exists ... needs to be imported"). Fix: delete
      # the stale secrets (they go soft-deleted; the azurerm provider's
      # recover_soft_deleted_secrets then recovers and rewrites them) and
      # apply once more. Harmless if the apply failed for another reason:
      # deleting secrets Terraform already manages just makes the retry
      # recreate them with the same values from state.
      - name: Azure login (stale Key Vault secret cleanup)
        if: steps.apply.outcome == 'failure'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_PLATFORM_RW }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Clear stale Key Vault secrets
        if: steps.apply.outcome == 'failure'
        run: |
          KV=$(az keyvault list -g "${{ vars.APP_RESOURCE_GROUP }}" --query "[0].name" -o tsv)
          if [ -z "$KV" ]; then echo "No Key Vault in RG — nothing to clean"; exit 0; fi
          for s in sql-datasource-url sql-datasource-username sql-datasource-password grafana-admin-password \
                   azure-openai-endpoint azure-openai-api-key azure-openai-deployment azure-openai-api-version; do
            az keyvault secret delete --vault-name "$KV" --name "$s" -o none 2>/dev/null \
              && echo "deleted stale secret: $s" || echo "skip: $s"
          done
          sleep 20 # let the soft-delete settle before the retry recovers them

      # Fresh plan, same reviewed commit, same gated environment — the plan
      # file above is stale after the partial first apply.
      - name: Terraform apply (retry after cleanup)
        if: steps.apply.outcome == 'failure'
        run: terraform -chdir=${{ env.TF_DIR }} apply -input=false -auto-approve

      - name: Show outputs
        run: terraform -chdir=${{ env.TF_DIR }} output
