name: infra-drift

# Nightly drift detection (docs/runbook.md "drift" section, automated):
# `terraform plan -detailed-exitcode` against live state with the READ-ONLY
# platform identity. Exit code 2 = drift â†’ open/refresh a GitHub issue and
# fail the run so it shows red. Nothing here can mutate Azure.
#
# OIDC subject for scheduled runs is `ref:refs/heads/main` â€” bootstrap.sh adds
# that federated credential to platform-ro alongside its pull_request one.
on:
  push:
    branches: main
  workflow_dispatch: {}

concurrency:
  group: infra-drift
  cancel-in-progress: false

permissions: {}

env:
  TF_DIR: infra/terraform
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_PLATFORM_RO }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  # ingress hosts feed the Argo CD Application specs (gitops.tf)
  TF_VAR_frontend_host_staging: ${{ vars.FRONTEND_HOST_STAGING }}
  TF_VAR_frontend_host_production: ${{ vars.FRONTEND_HOST_PRODUCTION }}
  # Azure OpenAI (optional AI assistant): endpoint/deployment are identifiers
  # (repo variables); the key is a repo SECRET. Blank = AI wiring disabled.
  TF_VAR_azure_openai_endpoint: ${{ vars.AZURE_OPENAI_ENDPOINT }}
  TF_VAR_azure_openai_deployment: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
  TF_VAR_azure_openai_api_key: ${{ secrets.AZURE_OPENAI_API_KEY }}

jobs:
  drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for Azure (read-only identity)
      issues: write # drift report issue
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1.9"

      - name: Terraform init (remote state, injected backend config)
        run: |
          terraform -chdir=${{ env.TF_DIR }} init -input=false \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=infra.tfstate"

      - name: Terraform plan (drift check, read-only)
        id: plan
        run: |
          set +e
          terraform -chdir=${{ env.TF_DIR }} plan -input=false -no-color \
            -detailed-exitcode -lock=false | tee drift.txt
          code=${PIPESTATUS[0]}
          set -e
          echo "exitcode=${code}" >> "$GITHUB_OUTPUT"
          # 0 = clean, 2 = drift (handled below), 1 = plan error
          if [ "$code" = "1" ]; then exit 1; fi

      - name: Report drift as a GitHub issue
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('drift.txt', 'utf8');
            const limit = 60000;
            if (plan.length > limit) plan = plan.slice(0, limit) + '\nâ€¦ (truncated â€” full plan in the workflow log)';
            const title = 'Infrastructure drift detected';
            const body = [
              `Nightly \`terraform plan -detailed-exitcode\` found live state diverging from \`infra/terraform\` (run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              '',
              'Follow the drift runbook: docs/runbook.md.',
              '',
              `<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${plan}\n\`\`\`\n</details>`,
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'drift',
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['drift'],
              });
            }

      - name: Fail the run when drift exists
        if: steps.plan.outputs.exitcode == '2'
        run: |
          echo "::error::Drift detected â€” see the 'drift' issue."
          exit 1
