{{- if .Values.secretProviderClass.enabled }}
{{- $mounted := .Values.secretProviderClass.objects }}
{{- if .Values.secretProviderClass.aiEnabled }}
{{- $mounted = concat $mounted .Values.secretProviderClass.aiObjects }}
{{- end }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "backend.name" . }}-kv
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    clientID: {{ required "serviceAccount.azureClientId is required" .Values.serviceAccount.azureClientId | quote }}
    keyvaultName: {{ required "secretProviderClass.keyVaultName is required" .Values.secretProviderClass.keyVaultName | quote }}
    tenantId: {{ required "secretProviderClass.tenantId is required" .Values.secretProviderClass.tenantId | quote }}
    objects: |
      array:
        {{- range $mounted }}
        - |
          objectName: {{ .kvSecretName }}
          objectType: secret
        {{- end }}
  # Sync mounted secrets into a K8s Secret so they can be injected as env vars
  # with the exact names the app contract expects (SPRING_DATASOURCE_*, and
  # AZURE_OPENAI_* when aiEnabled).
  secretObjects:
    - secretName: {{ .Values.secretProviderClass.syncedSecretName }}
      type: Opaque
      data:
        {{- range $mounted }}
        - objectName: {{ .kvSecretName }}
          key: {{ .envVarName }}
        {{- end }}
{{- end }}
